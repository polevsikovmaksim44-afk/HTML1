
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Неупорядченный список</title>
</head>
<body>
<h1>Список изученных тегов</h1>
<ul TYPE="SQUARE">
<li>html</li>
<li>head</li>
<li>body</li>
<li>ul</li>
<li>ol</li>
<li>btn</li>
</ul>
<p>Неупорядченный список используется для простого
перечисления объектов, когда порядок неважен</p>
</body>
</html>
